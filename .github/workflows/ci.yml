# ─────────────────────────────────────────────────────────────────────────────
# CI — fast checks that run on every push / PR
#
# Jobs:
#   frontend-typecheck  TypeScript compile check (tsc --noEmit)
#   frontend-build      Full Vite production build (catches bundler errors)
#
# These run in parallel and typically finish in ~2 minutes.
# The docker-publish workflow only runs after these pass on master.
# ─────────────────────────────────────────────────────────────────────────────

name: CI

on:
  push:
    branches: ["master"]
  pull_request:
    branches: ["master"]

jobs:
  # ── TypeScript type-check ─────────────────────────────────────────────────
  frontend-typecheck:
    name: TypeScript type-check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Type-check (tsc --noEmit)
        working-directory: frontend
        run: npx tsc --noEmit

  # ── Full Vite production build ────────────────────────────────────────────
  frontend-build:
    name: Vite production build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build
        working-directory: frontend
        run: npm run build

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/
          retention-days: 3
